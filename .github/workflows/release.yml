name: release

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            archive: zip
          - os: ubuntu-latest
            platform: linux
            archive: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: build
        run: cmake --build build --config Release --parallel
      - name: package windows
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $label = "${{ github.ref_name }}"
          $label = $label -replace '[^A-Za-z0-9._-]', '-'
          $out = "dist/EUI-NEO-$label-windows-x64.zip"
          $items = @()
          $items += Get-ChildItem build -Filter *.exe -File
          $items += Get-ChildItem build -Filter *.dll -File
          if (Test-Path build/font) { $items += Get-Item build/font }
          Compress-Archive -Path $items.FullName -DestinationPath $out -Force
      - name: package linux
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          mkdir -p dist
          label="$(echo "${GITHUB_REF_NAME}" | tr -cs 'A-Za-z0-9._-' '-')"
          out="dist/EUI-NEO-${label}-linux-x64.tar.gz"
          mapfile -t bins < <(find build -maxdepth 1 -type f \( -name 'eui_neo' -o -name 'app_*' \))
          files=("${bins[@]}")
          if [ -d build/font ]; then
            files+=("build/font")
          fi
          tar -czf "$out" "${files[@]}"
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
