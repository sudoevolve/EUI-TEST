name: release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            archive: zip
          - os: ubuntu-latest
            platform: linux
            archive: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: install linux deps
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libgl1-mesa-dev
      - name: configure windows
        if: matrix.platform == 'windows'
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded
      - name: configure linux
        if: matrix.platform == 'linux'
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DGLFW_BUILD_WAYLAND=OFF -DGLFW_BUILD_X11=ON
      - name: build
        run: cmake --build build --config Release --parallel
      - name: package windows
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $label = "${{ github.ref_name }}"
          $label = $label -replace '[^A-Za-z0-9._-]', '-'
          $out = "dist/EUI-NEO-$label-windows-x64.zip"
          $binDir = "build/Release"
          $items = @()
          $items += Get-ChildItem $binDir -Filter eui_neo.exe -File -ErrorAction SilentlyContinue
          $items += Get-ChildItem $binDir -Filter app_*.exe -File -ErrorAction SilentlyContinue
          if ($items.Count -eq 0) { throw "No .exe outputs found in build directory." }
          $items += Get-ChildItem $binDir -Filter glfw*.dll -File -ErrorAction SilentlyContinue
          if (Test-Path "$binDir/font") { $items += Get-Item "$binDir/font" }
          Compress-Archive -Path $items.FullName -DestinationPath $out -Force
      - name: upload windows release asset
        if: matrix.platform == 'windows' && startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $asset = (Get-ChildItem dist -Filter *.zip -File | Select-Object -First 1).FullName
          gh release view $tag | Out-Null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --notes ""
          }
          gh release upload $tag $asset --clobber
      - name: package linux
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          mkdir -p dist
          label="$(echo "${GITHUB_REF_NAME}" | tr -cs 'A-Za-z0-9._-' '-')"
          out="dist/EUI-NEO-${label}-linux-x64.tar.gz"
          mapfile -t bins < <(find build -maxdepth 1 -type f \( -name 'eui_neo' -o -name 'app_*' \))
          files=("${bins[@]}")
          if [ -d build/font ]; then
            files+=("build/font")
          fi
          tar -czf "$out" "${files[@]}"
      - name: upload linux release asset
        if: matrix.platform == 'linux' && startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          asset="$(find dist -maxdepth 1 -type f -name '*.tar.gz' | head -n 1)"
          gh release view "$tag" >/dev/null 2>&1 || gh release create "$tag" --title "$tag" --notes ""
          gh release upload "$tag" "$asset" --clobber
