name: release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: install linux deps
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libcurl4-openssl-dev

      - name: configure windows
        if: matrix.platform == 'windows'
        shell: pwsh
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded

      - name: configure linux
        if: matrix.platform == 'linux'
        shell: bash
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DGLFW_BUILD_WAYLAND=OFF -DGLFW_BUILD_X11=ON

      - name: build
        run: cmake --build build --config Release --parallel

      - name: package windows
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $label = "${{ github.ref_name }}"
          $label = $label -replace '[^A-Za-z0-9._-]', '-'
          $out = "dist/EUI-NEO-$label-windows-x64.zip"
          $binDir = "build/Release"

          $items = @()
          $items += Get-ChildItem $binDir -Filter *.exe -File -ErrorAction SilentlyContinue
          if ($items.Count -eq 0) { throw "No .exe outputs found in $binDir." }
          $items += Get-ChildItem $binDir -Filter glfw*.dll -File -ErrorAction SilentlyContinue
          if (Test-Path "$binDir/assets") { $items += Get-Item "$binDir/assets" }

          Compress-Archive -Path $items.FullName -DestinationPath $out -Force

      - name: package linux
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          mkdir -p dist
          label="$(echo "${GITHUB_REF_NAME}" | tr -cs 'A-Za-z0-9._-' '-')"
          out="dist/EUI-NEO-${label}-linux-x64.tar.gz"

          mapfile -t bins < <(find build -maxdepth 1 -type f -perm -111)
          files=("${bins[@]}")
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No executable outputs found in build." >&2
            exit 1
          fi
          mapfile -t glfw_libs < <(find build/_deps/glfw-build/src -maxdepth 1 -type f -name 'libglfw.so*' 2>/dev/null || true)
          files+=("${glfw_libs[@]}")
          if [ -d build/assets ]; then
            files+=("build/assets")
          fi

          tar -czf "$out" "${files[@]}"

      - name: upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: EUI-NEO-${{ matrix.platform }}-x64
          path: dist/*
          if-no-files-found: error

      - name: upload windows release asset
        if: matrix.platform == 'windows' && startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $asset = (Get-ChildItem dist -Filter *.zip -File | Select-Object -First 1).FullName
          gh release view $tag | Out-Null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --notes ""
            if ($LASTEXITCODE -ne 0) {
              gh release view $tag | Out-Null
              if ($LASTEXITCODE -ne 0) { throw "Failed to create or find release $tag." }
            }
          }
          gh release upload $tag $asset --clobber

      - name: upload linux release asset
        if: matrix.platform == 'linux' && startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          asset="$(find dist -maxdepth 1 -type f -name '*.tar.gz' | head -n 1)"
          gh release view "$tag" >/dev/null 2>&1 || gh release create "$tag" --title "$tag" --notes "" || gh release view "$tag" >/dev/null
          gh release upload "$tag" "$asset" --clobber
